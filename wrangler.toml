name = "sorteo-mundial-worker"
main = "worker.js"
compatibility_date = "2026-07-01"

# Se crea al hacer "npx wrangler kv namespace create SORTEO_KV"
# y luego pegas aquí el id que te entregue.
kv_namespaces = [
  { binding = "SORTEO_KV", id = "REEMPLAZA_CON_TU_KV_ID" }
]

[vars]
# Cámbialo por una palabra secreta única para tu familia.
# Debe coincidir EXACTO con ADMIN_TOKEN en index.html
ADMIN_TOKEN = "cambia-este-secreto-2026"
